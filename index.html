<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TRLista</title>
  <link rel="icon" type="image/png" href="assets/img/trlogo.png">

  <!-- Bootstrap & FontAwesome -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

  <!-- Estilos propios -->
  
  <link href="assets/css/styles.css" rel="stylesheet">

  <!-- Librerías JS externas -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body class="bg-light">

  <!-- TOP NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container-fluid">
      <a class="navbar-brand d-flex align-items-center gap-2" href="#">
        <img src="assets/img/trlogo.png" alt="Logo TR" class="logo-navbar">
        <span class="fw-semibold">TRLista</span>
      </a>

      <div class="d-flex align-items-center gap-3 ms-auto">
        <span class="badge bg-secondary" id="lastSaved">
          <i class="fa-solid fa-clock-rotate-left me-1"></i>
          Aún no guardado.
        </span>
      </div>
    </div>
  </nav>

  <!-- MAIN CONTENT -->
  <main class="container-fluid py-4">
    <div class="row g-4">

      <!-- PANEL PRINCIPAL -->
      <div class="col-12">

        
<div class="card shadow-sm mb-4 workspace-top-card workspace-config-card">
  <div class="card-header bg-white border-0">
    <h6 class="card-title mb-0">
      <i class="fa-solid fa-sliders me-2 text-primary"></i>
      Configuración e histórico
    </h6>
  </div>

  <div class="card-body border-top">
    <div class="row g-3 align-items-start workspace-config-row-balanced">
      <div class="col-12 col-lg-4">
        <div class="config-field-stack h-100">
          <label for="storeSelect" class="form-label fw-semibold mb-1">Tienda</label>
          <div class="store-select-shell store-tone-morazan">
            <span class="store-select-icon" aria-hidden="true">
              <i class="fa-solid fa-store"></i>
            </span>
            <select id="storeSelect" class="form-select form-select-sm">
              <option value="lista_sexta_calle">Sexta Calle</option>
              <option value="lista_avenida_morazan" selected>Avenida Morazán</option>
              <option value="lista_centro_comercial">Centro Comercial</option>
            </select>
          </div>
        </div>
      </div>

      <div class="col-12 col-lg-4">
        <div class="config-field-stack h-100">
          <label for="versionSelect" class="form-label fw-semibold mb-1">Versión de lista</label>
          <select id="versionSelect" class="form-select form-select-sm">
            <option value="base" selected>Principal</option>
            <option value="alterna">Alterna</option>
            <option value="traslado">Traslado</option>
          </select>
        </div>
      </div>

      <div class="col-12 col-lg-4">
        <div class="hist-date-wrapper config-field-stack h-100">
          <label for="histDateInput" class="form-label fw-semibold mb-1">Recepciones por fecha</label>
          <div class="history-search-shell history-calendar-shell">
            <div class="control-shell control-shell-search control-shell-history">
              <span class="control-icon" aria-hidden="true">
                <i class="fa-solid fa-calendar-day"></i>
              </span>

              <input
                id="histDateInput"
                type="text"
                class="form-control control-input"
                placeholder="Selecciona fecha"
                autocomplete="off"
                readonly
              >

              <div class="control-actions control-actions-compact">
                <button type="button" id="btnHistToday" class="btn btn-outline-secondary control-inline-btn" title="Volver a hoy">
                  <i class="fa-solid fa-rotate-left"></i>
                  <span>Hoy</span>
                </button>
              </div>
            </div>

            <div id="histCalendarPanel" class="history-calendar-panel d-none" aria-hidden="true"></div>
          </div>

          <div class="form-text small" id="histViewModeText">
            Modo: checklist del día actual (editable).
          </div>
        </div>
      </div>

      <div class="col-12 d-none">
        <div class="store-badge-wrap">
          <span id="storeBadge" class="badge-store badge-morazan">
            <i class="fa-solid fa-store"></i>
            <span id="storeBadgeText">Avenida Morazán</span>
          </span>
        </div>
      </div>
    </div>
  </div>
</div>

        <!-- Card: Checklist -->
        <div class="card shadow-sm">
          <div class="card-header bg-white border-0">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
              <div>
                <h6 class="card-title mb-1">
                  <i class="fa-solid fa-list-check me-2 text-primary"></i>
                  Checklist de productos
                </h6>
              </div>

              <!-- Toolbar -->
              <div class="btn-toolbar gap-2 checklist-actions-toolbar" role="toolbar" aria-label="Toolbar">
                <button type="button" id="btnToggleHistLock" class="btn btn-outline-warning btn-sm d-none" disabled aria-disabled="true">
                  <i class="fa-solid fa-unlock-keyhole me-1"></i>
                  Desbloquear
                </button>
                <button type="button" id="btnHistoricalSelectMode" class="btn btn-outline-info btn-sm d-none" disabled aria-disabled="true">
                  <i class="fa-regular fa-square-check me-1"></i>
                  Seleccionar productos
                </button>
                <button type="button" id="btnMergeSelectedToToday" class="btn btn-outline-primary btn-sm d-none" disabled aria-disabled="true">
                  <i class="fa-solid fa-share-from-square me-1"></i>
                  Enviar a hoy
                </button>
                <button id="btnSave" class="btn btn-primary btn-sm">
                  <i class="fa-solid fa-floppy-disk me-1"></i> Guardar
                </button>
                <button id="btnReqFlag" class="btn btn-outline-secondary btn-sm" type="button" title="Marcar requisición hecha o pendiente">
                  <i class="fa-regular fa-flag me-1"></i> Requisición pendiente
                </button>
                <button id="btnPDF" class="btn btn-outline-danger btn-sm">
                  <i class="fa-solid fa-file-pdf me-1"></i> PDF
                </button>
                <button id="btnExcel" class="btn btn-outline-success btn-sm">
                  <i class="fa-solid fa-file-excel me-1"></i> Excel
                </button>
                <button id="btnClear" class="btn btn-outline-secondary btn-sm">
                  <i class="fa-solid fa-trash-can me-1"></i> Limpiar
                </button>
              </div>
            </div>
          </div>

          <div class="card-body border-top">
            <div class="checklist-workspace">
              <div class="checklist-search-shell">
                <div class="checklist-search-toolbar checklist-search-toolbar-single">
                  <div class="position-relative checklist-search-input-wrap">
                    <div class="input-group input-group-sm search-bar-group search-bar-embedded">
                      <span class="input-group-text search-lead-chip">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <span>Buscar producto</span>
                      </span>
                      <input
                        id="searchInput"
                        type="text"
                        class="form-control"
                        placeholder="Nombre, código inventario o código de barras"
                        autocomplete="off"
                      >
                      <button
                        id="btnFilePick"
                        class="btn btn-outline-secondary search-action-btn"
                        type="button"
                        title="Adjuntar imagen o documento"
                        aria-label="Adjuntar imagen o documento"
                      >
                        <i class="fa-solid fa-paperclip"></i>
                      </button>
                      <button
                        id="btnScan"
                        class="btn btn-outline-primary search-action-btn"
                        type="button"
                        title="Escanear código de barras"
                        aria-label="Escanear código de barras"
                      >
                        <i class="fa-solid fa-barcode"></i>
                      </button>
                    </div>

                    <input
                      id="fileScan"
                      class="d-none"
                      type="file"
                      accept="image/*,application/pdf,.pdf"
                      capture="environment"
                    >

                    <ul id="suggestions" class="list-group shadow-sm search-suggestions"></ul>
                  </div>
                </div>

                <div id="scanWrap" class="scanner-wrap scan-panel">
                  <div class="scanner">
                    <video id="scanVideo" playsinline></video>
                    <div class="scan-overlay"></div>
                  </div>
                </div>
              </div>

              <div class="table-checklist-shell mt-3">
                <div class="table-responsive table-checklist-wrapper">
              <table class="table table-sm table-bordered align-middle mb-0" id="chkTable">
                <thead class="table-light">
                  <tr>
                    <th class="text-center" style="width: 48px;">#</th>
                    <th>Cód. barras</th>
                    <th>Nombre</th>
                    <th class="text-nowrap">Cód. inventario</th>
                    <th id="thBodega" style="cursor:pointer;">
                      Bodega <i class="fa-solid fa-arrow-up-wide-short ms-1 text-muted"></i>
                    </th>
                    <th class="text-center text-nowrap">Cant.</th>
                    <th class="text-center text-nowrap">Revisado</th>
                    <th class="text-center text-nowrap">Despachado</th>
                    <th class="text-center text-nowrap">Acciones</th>
                    <th id="thHistorySelect" class="text-center text-nowrap d-none history-select-col">
                      <div class="d-inline-flex align-items-center gap-2 history-select-all-wrap">
                        <input id="chkSelectAllHistory" class="form-check-input mt-0" type="checkbox" aria-label="Seleccionar todos los productos históricos">
                        <span>Seleccionar</span>
                      </div>
                    </th>
                  </tr>
                </thead>
                <tbody id="chkBody"></tbody>
              </table>
                </div>
              </div>
            </div>
          </div>
        </div>

      </div><!-- /panel principal -->
    </div><!-- /row -->
  </main>

  <!-- Bootstrap + SweetAlert -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <!-- Firebase (Firestore) -->
  <script src="https://www.gstatic.com/firebasejs/12.6.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.6.0/firebase-firestore-compat.js"></script>
  <script>
    // Inicializar Firebase solo una vez (misma configuración que TR-Inventario)
    if (typeof firebase !== 'undefined' && firebase.apps && !firebase.apps.length) {
      const firebaseConfig = {
        apiKey: "AIzaSyBeMLx42bljbL3IrYeFhPFsGXNUwfqkbEg",
        authDomain: "tr-db-4e235.firebaseapp.com",
        projectId: "tr-db-4e235",
        storageBucket: "tr-db-4e235.firebasestorage.app",
        messagingSenderId: "21241790572",
        appId: "1:21241790572:web:6fcd35853e44201badd849"
      };
      firebase.initializeApp(firebaseConfig);
}
  </script>

  <!-- App -->
  <script src="assets/js/app.js"></script>
  <script src="assets/js/checklist.js"></script>
</body>
</html>
