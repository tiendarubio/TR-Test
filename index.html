<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>TRLista</title>
  <link rel="icon" type="image/png" href="assets/img/trlogo.png">

  <!-- Bootstrap & FontAwesome -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

  <!-- Estilos propios -->
  
  <link href="assets/css/styles.css" rel="stylesheet">

  <!-- Librerías JS externas -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body class="bg-light">

  <!-- TOP NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container-fluid">
      <a class="navbar-brand d-flex align-items-center gap-2" href="#">
        <img src="assets/img/trlogo.png" alt="Logo TR" class="logo-navbar">
        <span class="fw-semibold">TRLista</span>
      </a>

      <div class="ms-auto"></div>
    </div>
  </nav>

  <!-- MAIN CONTENT -->
  <main class="container-fluid py-4">
    <div class="row g-4">

      <!-- PANEL PRINCIPAL -->
      <div class="col-12">

        
<div class="card shadow-sm mb-4 workspace-top-card workspace-config-card">
  <div class="card-header bg-white border-0">
    <h6 class="card-title mb-0">
      <i class="fa-solid fa-sliders me-2 text-primary"></i>
      Configuración e histórico
    </h6>
  </div>

  <div class="card-body border-top">
    <div class="row g-3 align-items-start workspace-config-row-balanced">
      <div class="col-12 col-lg-4">
        <div class="config-field-stack h-100">
          <label for="storeSelect" class="form-label fw-semibold mb-1">Tienda</label>
          <div class="store-select-shell store-tone-morazan">
            <span class="store-select-icon" aria-hidden="true">
              <i class="fa-solid fa-store"></i>
            </span>
            <select id="storeSelect" class="form-select form-select-sm">
              <option value="lista_sexta_calle">Sexta Calle</option>
              <option value="lista_avenida_morazan" selected>Avenida Morazán</option>
              <option value="lista_centro_comercial">Centro Comercial</option>
            </select>
          </div>
        </div>
      </div>

      <div class="col-12 col-lg-4">
        <div class="config-field-stack h-100">
          <label for="versionSelect" class="form-label fw-semibold mb-1">Versión de lista</label>
          <select id="versionSelect" class="form-select form-select-sm">
            <option value="base" selected>Principal</option>
            <option value="alterna">Alterna</option>
            <option value="traslado">Traslado</option>
          </select>
        </div>
      </div>

      <div class="col-12 col-lg-4">
        <div class="hist-date-wrapper config-field-stack h-100">
          <label for="histDateInput" class="form-label fw-semibold mb-1">Recepciones por fecha</label>
          <div class="history-search-shell history-calendar-shell">
            <div class="control-shell control-shell-search control-shell-history">
              <span class="control-icon" aria-hidden="true">
                <i class="fa-solid fa-calendar-day"></i>
              </span>

              <input
                id="histDateInput"
                type="text"
                class="form-control control-input"
                placeholder="Selecciona fecha"
                autocomplete="off"
                readonly
              >

              <div class="control-actions control-actions-compact">
                <button type="button" id="btnHistToday" class="btn btn-outline-secondary control-inline-btn" title="Volver a hoy">
                  <i class="fa-solid fa-rotate-left"></i>
                  <span>Hoy</span>
                </button>
              </div>
            </div>

            <div id="histCalendarPanel" class="history-calendar-panel d-none" aria-hidden="true"></div>
          </div>

          <div class="form-text small" id="histViewModeText">
            Modo: checklist del día actual (editable).
          </div>
        </div>
      </div>

      <div class="col-12 d-none">
        <div class="store-badge-wrap">
          <span id="storeBadge" class="badge-store badge-morazan">
            <i class="fa-solid fa-store"></i>
            <span id="storeBadgeText">Avenida Morazán</span>
          </span>
        </div>
      </div>
    </div>
  </div>
</div>

        <!-- Card: Checklist -->
        <div class="card shadow-sm">
          <div class="card-header bg-white border-0 checklist-card-header">
          <div class="checklist-header-shell">
            <div class="checklist-header-top">
              <div class="checklist-heading-block">
                <h6 class="card-title mb-0">
                  <i class="fa-solid fa-list-check me-2 text-primary"></i>
                  Checklist de productos
                </h6>
              </div>

              <div class="workspace-status-inline">
                <span class="workspace-status-badge" id="lastSaved">
                  <i class="fa-solid fa-clock-rotate-left me-1"></i>
                  Aún no guardado.
                </span>
              </div>
            </div>

            <div class="checklist-primary-toolbar" role="toolbar" aria-label="Acciones principales">
              <button id="btnSave" class="btn btn-primary btn-sm" title="Guardar checklist">
                <i class="fa-solid fa-floppy-disk" aria-hidden="true"></i>
                <span>Guardar</span>
              </button>
              <button id="btnPDF" class="btn btn-outline-danger btn-sm" title="Descargar PDF">
                <i class="fa-solid fa-file-pdf" aria-hidden="true"></i>
                <span>PDF</span>
              </button>
              <button id="btnExcel" class="btn btn-outline-success btn-sm" title="Descargar Excel">
                <i class="fa-solid fa-file-excel" aria-hidden="true"></i>
                <span>Excel</span>
              </button>
              <button id="btnClear" class="btn btn-outline-secondary btn-sm" title="Limpiar checklist">
                <i class="fa-solid fa-trash-can" aria-hidden="true"></i>
                <span>Limpiar</span>
              </button>

              <details class="toolbar-menu" id="moreActionsMenu">
                <summary class="btn btn-outline-secondary btn-sm toolbar-menu-toggle" title="Más acciones">
                  <i class="fa-solid fa-ellipsis" aria-hidden="true"></i>
                  <span>Más</span>
                </summary>

                <div class="toolbar-menu-panel">
                  <div class="toolbar-menu-title">Acciones especiales</div>
                  <div class="toolbar-menu-actions">
                    <button type="button" id="btnToggleHistLock" class="btn btn-outline-warning btn-sm d-none" disabled aria-disabled="true" title="Desbloquear edición">
                      <i class="fa-solid fa-unlock-keyhole" aria-hidden="true"></i>
                      <span>Desbloq.</span>
                    </button>
                    <button type="button" id="btnToggleRequisition" class="btn btn-outline-secondary btn-sm" title="Estado de requisición">
                      <i class="fa-regular fa-flag" aria-hidden="true"></i>
                      <span>Req.</span>
                    </button>
                  </div>
                </div>
              </details>
            </div>
          </div>
        </div>

          <div class="card-body border-top">
            <div class="checklist-workspace">
              <div class="checklist-search-shell">
                <div class="checklist-search-toolbar checklist-search-toolbar-single">
                  <div class="position-relative checklist-search-input-wrap">
                    <div class="input-group input-group-sm search-bar-group search-bar-embedded">
                      <span class="input-group-text search-lead-chip">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <span>Buscar producto</span>
                      </span>
                      <input
                        id="searchInput"
                        type="text"
                        class="form-control"
                        placeholder="Nombre, código inventario o código de barras"
                        autocomplete="off"
                      >
                      <button
                        id="btnFilePick"
                        class="btn btn-outline-secondary search-action-btn"
                        type="button"
                        title="Adjuntar imagen o documento"
                        aria-label="Adjuntar imagen o documento"
                      >
                        <i class="fa-solid fa-paperclip"></i>
                      </button>
                      <button
                        id="btnScan"
                        class="btn btn-outline-primary search-action-btn"
                        type="button"
                        title="Escanear código de barras"
                        aria-label="Escanear código de barras"
                      >
                        <i class="fa-solid fa-barcode"></i>
                      </button>
                    </div>

                    <input
                      id="fileScan"
                      class="d-none"
                      type="file"
                      accept="image/*,application/pdf,.pdf"
                      capture="environment"
                    >

                    <ul id="suggestions" class="list-group shadow-sm search-suggestions"></ul>
                  </div>
                </div>

                <div id="scanWrap" class="scanner-wrap scan-panel">
                  <div class="scanner">
                    <video id="scanVideo" playsinline></video>
                    <div class="scan-overlay"></div>
                  </div>
                </div>
</div>

<div id="bulkSelectionBar" class="bulk-selection-bar d-none" aria-hidden="true">
  <div class="bulk-selection-summary">
    <span class="bulk-selection-count-pill">
      <i class="fa-regular fa-square-check" aria-hidden="true"></i>
      <span id="bulkSelectionCount">0 filas seleccionadas</span>
    </span>
  </div>

  <div class="bulk-selection-actions" role="toolbar" aria-label="Acciones sobre selección">
    <button id="btnReviewSelected" class="btn btn-outline-primary btn-sm" disabled aria-disabled="true" title="Marcar seleccionados como revisados">
      <i class="fa-solid fa-clipboard-check" aria-hidden="true"></i>
      <span>Revisar</span>
    </button>
    <button id="btnDispatchSelected" class="btn btn-outline-success btn-sm" disabled aria-disabled="true" title="Marcar seleccionados como despachados">
      <i class="fa-solid fa-truck-ramp-box" aria-hidden="true"></i>
      <span>Despachar</span>
    </button>
    <button type="button" id="btnMergeSelectedToToday" class="btn btn-outline-primary btn-sm d-none" disabled aria-disabled="true" title="Enviar seleccionados a hoy">
      <i class="fa-solid fa-share-from-square" aria-hidden="true"></i>
      <span>Enviar hoy</span>
    </button>
    <button id="btnDeleteSelected" class="btn btn-outline-danger btn-sm" disabled aria-disabled="true" title="Eliminar seleccionados">
      <i class="fa-solid fa-trash-can-list" aria-hidden="true"></i>
      <span>Eliminar</span>
    </button>
  </div>
</div>

<div class="table-checklist-shell mt-3">
                <div class="table-responsive table-checklist-wrapper">
              <table class="table table-sm table-bordered align-middle mb-0" id="chkTable">
                <thead class="table-light">
                  <tr>
                    <th class="text-center text-nowrap bulk-select-col sticky-col-select">
                      <div class="d-inline-flex align-items-center justify-content-center gap-2 bulk-select-header-wrap">
                        <input id="chkSelectAllRows" class="form-check-input mt-0" type="checkbox" aria-label="Seleccionar todas las filas de la tabla">
                        <span class="d-none d-md-inline">Sel.</span>
                      </div>
                    </th>
                    <th class="text-center" style="width: 48px;">#</th>
                    <th>Cód. barras</th>
                    <th>Nombre</th>
                    <th class="text-nowrap">Cód. inv.</th>
                    <th id="thBodega" style="cursor:pointer;">
                      Bodega <i class="fa-solid fa-arrow-up-wide-short ms-1 text-muted"></i>
                    </th>
                    <th class="text-center text-nowrap">Cant.</th>
                    <th class="text-center text-nowrap">Acciones</th>
                  </tr>
                </thead>
                <tbody id="chkBody"></tbody>
              </table>
                </div>
              </div>
            </div>
          </div>
        </div>

      </div><!-- /panel principal -->
    </div><!-- /row -->
  </main>

  <div id="appLoadingOverlay" class="app-loading-overlay d-none" aria-hidden="true">
    <div class="app-loading-card" role="status" aria-live="polite" aria-atomic="true">
      <div class="spinner-border text-primary app-loading-spinner" aria-hidden="true"></div>
      <div id="appLoadingText" class="app-loading-text">Cargando checklist...</div>
    </div>
  </div>

  <div id="qtyPreviewBubble" class="qty-preview-bubble d-none" aria-hidden="true"></div>

  <!-- Bootstrap + SweetAlert -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <!-- Firebase (Firestore) -->
  <script src="https://www.gstatic.com/firebasejs/12.6.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.6.0/firebase-firestore-compat.js"></script>

  <!-- App -->
  <script src="assets/js/app.js"></script>
  <script src="assets/js/checklist.js"></script>
</body>
</html>
